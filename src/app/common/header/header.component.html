<header class="p-3 text-bg-dark">
  <div class="container">
    <nav class="navbar navbar-expand-lg">
      <div class="container-fluid">
        <a routerLink="/blog/articles"
          class="navbar-brand text-white">
          {{configService.config.site_name}}
        </a>
        
        <button class="navbar-toggler navbar-dark" type="button" 
          (click)="toggleMenu()" 
          [attr.aria-expanded]="isMenuExpanded"
          aria-controls="navbarNav" 
          aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav" 
          [class.show]="isMenuExpanded">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a routerLink="/blog/articles" class="nav-link text-white" 
                routerLinkActive="active" 
                (click)="closeMenu()">首页</a>
            </li>
            <li class="nav-item">
              <a routerLink="/user/edit" class="nav-link text-white" 
                routerLinkActive="active"
                (click)="closeMenu()">写文章</a>
            </li>
            @if (user.isAuthenticated) {
              <li class="nav-item">
                <a routerLink="/user" class="nav-link text-white"
                  routerLinkActive="active"
                  (click)="closeMenu()">管理</a>
              </li>
            }
          </ul>

          <form class="d-flex mb-3 mb-lg-0" (ngSubmit)="onSearch()" role="search">
            <input type="search" class="form-control search-input me-2" placeholder="搜索文章..."
              aria-label="Search" [(ngModel)]="searchKeyword" name="searchKeyword" 
              (keydown)="onSearchKeyDown($event)">
          </form>

          <div class="d-flex">

            @if (!user.isAuthenticated) {
              <button type="button" class="btn btn-outline-light me-2"
              (click)="login()">登录</button>
            } @else {
              <div ngbDropdown class="d-inline-block">
                <div ngbDropdownToggle id="dropdownBasic1">
                  @if (user.user.avatar) {
                    <img [src]="user.user.avatar" />
                  } @else {
                    <i class="bi bi-person"></i>
                  }
                  <span>{{user.user.nick}}</span>
                </div>
                <div ngbDropdownMenu aria-labelledby="dropdownBasic1">
                  <button ngbDropdownItem (click)="logout()">注销</button>
                </div>
              </div>
            }

          </div>
        </div>
      </div>
    </nav>
  </div>
<app-alert [(alerts)]="message"></app-alert>
</header>
