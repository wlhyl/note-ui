<div class="user-layout">
    <app-header></app-header>
    
    <main class="main-content">
        <div class="sidebar-header d-lg-none">
            <button class="btn btn-outline-light sidebar-toggle" (click)="toggleSidebar()">
                <i class="bi" [class.bi-list]="isSidebarCollapsed" [class.bi-chevron-left]="!isSidebarCollapsed"></i>
                {{ isSidebarCollapsed ? '展开菜单' : '收起' }}
            </button>
        </div>
        
        <div class="left-sidebar d-lg-block" [class.collapsed]="isSidebarCollapsed">
            <nav class="nav flex-column">
                <a class="nav-link my-1" routerLink="articles" routerLinkActive="active" aria-current="文章">文章</a>
                <a class="nav-link my-1" routerLink="categories" routerLinkActive="active" aria-current="文章分类">文章分类</a>
                <a class="nav-link my-1" routerLink="tags" routerLinkActive="active" aria-current="文章标签">文章标签</a>
                <a class="nav-link my-1" routerLink="images" routerLinkActive="active" aria-current="图片">图片</a>
                <a class="nav-link my-1" routerLink="edit" routerLinkActive="active" aria-current="写文章">写文章</a>
                <a class="nav-link my-1" routerLink="userinfo" routerLinkActive="active" aria-current="用户">用户</a>
                <a class="nav-link my-1" routerLink="config" routerLinkActive="active" aria-current="配置">配置</a>
            </nav>
        </div>
        
        <div class="main-area">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
